name: DevOps Sprint CI-CD Automation Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 🔑 Step: Testing ke liye ek dummy .env file create karna
    - name: Create Dummy Env File for Validation
      run: |
        echo "Creating dummy .env file..."
        touch .env
        echo "DB_HOST=localhost" >> .env
        echo "DB_USER=root" >> .env
        echo "DB_PASSWORD=dummy" >> .env

    - name: Verify Docker Compose Syntax & Build
      run: |
        echo "Starting automated integration checks..."
        docker compose config
