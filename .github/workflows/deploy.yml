name: DevOps Sprint CI-CD Automation Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Create Dummy Env File for Validation
      run: |
        touch .env
        echo "DB_HOST=localhost" >> .env
        echo "DB_USER=root" >> .env
        echo "DB_PASSWORD=dummy" >> .env

    - name: Verify Docker Compose Syntax & Build
      run: |
        docker compose config

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "💥 Successfully connected to AWS EC2 via GitHub Actions!"
          cd ~/my-website
          git pull origin master
          docker compose down
          docker compose up -d --build
          echo "🚀 Deployment Complete! System is fully automated."
