version: '3.8'

services:
  telemetry-sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    image: telemetry-pipeline-core:v1.0
    container_name: prod_telemetry_sentinel
    environment:
      - TELEMETRY_KEY=${TELEMETRY_KEY:-default_secret_key}
    volumes:
      - ./archive:/app/prod-infra/archive
      - ./remote_backup_staging:/app/prod-infra/remote_backup_staging
    restart: on-failure
