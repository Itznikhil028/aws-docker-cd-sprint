services:
  telemetry-sentinel:
    container_name: prod_telemetry_sentinel
    image: telemetry-pipeline-core:${SENTINEL_VERSION}
    build:
      context: ..
      dockerfile: prod-infra/Dockerfile
    environment:
      - TELEMETRY_KEY=prod_secret_88912
      - ENV_MODE=${ENVIRONMENT}
      - LOG_RETENTION=${LOG_RETENTION_DAYS}
    volumes:
      - ${ARCHIVE_PATH}:/app/archive
      - ${BACKUP_PATH}:/app/remote_backup_staging
    restart: on-failure
