<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nikhil Cloud Engine | Day 78</title>
    <style>
        body { 
            background: #0b0f19; 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; /* Content vertical line me align hoga */
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .dynamic-card { 
            background: #111827; 
            padding: 3rem; 
            border-radius: 16px;               
            box-shadow: 0 0 35px var(--glow-color, #ef4444); /* VARIABLE SE SHADOW BADLEGI */
            border: 1px solid var(--glow-color, #ef4444);    /* VARIABLE SE BORDER BADLEGA */
            text-align: center;
            max-width: 450px;
            transition: all 0.4s ease; /* Smooth fade animation */
        }

        h1 { 
            color: var(--glow-color, #ef4444); /* VARIABLE SE NAAM KA RANG BADLEGA */
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
        }

        .branch-text {
            color: #9ca3af;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-family: monospace;
            border-left: 3px solid var(--glow-color, #ef4444);
        }
    </style>
</head>
<body>

    <div class="dynamic-card" style="--glow-color: #f59e0b;">
        <h1>Nikhil Cloud Engine</h1>
        <div class="branch-text">B.Tech CSIT - Day 78</div>
        <div class="status-badge">Status: Cyberpunk Yellow Variable Loaded</div>
    </div>

</body>
</html>
