services:
  web:
    image: nginx
    container_name: my-compose-frontend
    ports:
      - "80:80"
    env_file:
      - .env
    networks:
      - app-net
    volumes:
      - ./templates:/tmp/templates
    command: >
      bash -c "envsubst < /tmp/templates/index.html.template > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"

  backend-api:
    image: node:20-alpine
    container_name: my-compose-backend
    working_dir: /app
    volumes:
      - ./server:/app
    networks:
      - app-net
    command: node index.js

  database:
    image: mongo:latest
    container_name: my-compose-database
    networks:
      - app-net
    volumes:
      - db-data:/data/db
    ports:
      - "27017:27017"

networks:
  app-net:
    driver: bridge

volumes:
  db-data:
    driver: local
