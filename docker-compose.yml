services:
  web:
    image: nginx:alpine
    container_name: my-compose-frontend
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      - ENV_NAME=${ENV_NAME}
    networks:
      - app-net
    volumes:
      - ./templates:/tmp/templates
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-api
    # 🔥 Absolute shell syntax without quote mismatch issues
    command: /bin/sh -c "envsubst < /tmp/templates/index.html.template > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"

  backend-api:
    build: ./server
    container_name: my-compose-backend
    networks:
      - app-net
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mongo:4.4
    container_name: my-compose-database
    networks:
      - app-net
    volumes:
      - db-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  app-net:
    driver: bridge

volumes:
  db-data:
    driver: local
